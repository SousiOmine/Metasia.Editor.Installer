name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [windows-latest]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 1

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                go-version: '1.23'
                check-latest: true

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: MetasiaEditorInstaller-GUI/frontend/package-lock.json

            - name: Install Wails CLI
              run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

            - name: Install frontend dependencies
              working-directory: MetasiaEditorInstaller-GUI/frontend
              run: npm ci

            - name: Build Wails app
              working-directory: MetasiaEditorInstaller-GUI
              run: wails build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                name: MetasiaEditorInstaller-${{ matrix.os }}
                path: MetasiaEditorInstaller-GUI/build/bin/

    release:
        name: Create Release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                path: release-assets

            - name: Move release asset
              run: |
                mkdir -p upload
                find release-assets -name '*.zip' -exec cp {} upload/ \;

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                files: upload/*.zip
